run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
    - gofmt
    - goimports

linters-settings:
  gocritic:
    disabled-checks:
      - ifElseChain
  gosec:
    excludes:
      - G304
  goimports:
    local-prefixes: github.com/guilhermejansen/clearstack
  revive:
    rules:
      - name: var-naming
      - name: exported
      - name: package-comments
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
